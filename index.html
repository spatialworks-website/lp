<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Landing Page Fullscreen</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* remove barras de scroll */
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

img {
  width: 100vw;   /* largura total da viewport */
  height: 100vh;  /* altura total da viewport */
  object-fit: cover; /* mantém proporção e cobre todo o ecrã */
}
</style>
</head>
<body>
<img src="land.jpg" alt="Landing Page">
</body>
</html>
